<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="340" viewBox="0 0 1200 340" role="img" aria-label="Dense Embedding Fine-Tuning via Knowledge Distillation">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1120"/>
      <stop offset="0.55" stop-color="#111A33"/>
      <stop offset="1" stop-color="#1E1145"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5EEAD4"/>
      <stop offset="0.5" stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#C084FC"/>
    </linearGradient>
    <linearGradient id="teach" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#A855F7"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="stud" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2DD4BF"/>
      <stop offset="1" stop-color="#0EA5A4"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#60A5FA" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#60A5FA" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="340" rx="18" fill="url(#bg)"/>
  <circle cx="1010" cy="80" r="240" fill="url(#glow)"/>

  <!-- decorative embedding dots, top-right, clear of text -->
  <g fill="#2B3A66" opacity="0.5">
    <circle cx="1060" cy="42" r="2.4"/><circle cx="1100" cy="42" r="2.4"/><circle cx="1140" cy="42" r="2.4"/>
    <circle cx="1060" cy="78" r="2.4"/><circle cx="1100" cy="78" r="2.4"/><circle cx="1140" cy="78" r="2.4"/>
  </g>

  <!-- title block, full width -->
  <text x="64" y="96"  font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="52" font-weight="800" fill="url(#title)">Dense Embedding Fine-Tuning</text>
  <text x="66" y="138" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="25" font-weight="600" fill="#C7D2FE">Knowledge Distillation &#183; KL-Divergence + InfoNCE</text>
  <text x="66" y="170" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="16.5" font-weight="400" fill="#7E8AB5">An E5 replication: a cross-encoder reranker teaches a bi-encoder to retrieve.</text>

  <!-- thin divider above the footer strip -->
  <line x1="64" y1="200" x2="1136" y2="200" stroke="#26304F" stroke-width="1"/>

  <!-- footer: horizontal teacher -> student distillation strip -->
  <g font-family="'Segoe UI',Helvetica,Arial,sans-serif">
    <!-- teacher -->
    <rect x="64" y="236" width="210" height="66" rx="12" fill="url(#teach)"/>
    <text x="169" y="268" text-anchor="middle" font-size="17" font-weight="700" fill="#FFFFFF">Teacher</text>
    <text x="169" y="288" text-anchor="middle" font-size="12" fill="#EDE9FE">BGE-reranker-v2-m3</text>

    <!-- horizontal soft-labels arrow -->
    <line x1="280" y1="269" x2="462" y2="269" stroke="#8B93C0" stroke-width="2.2" stroke-dasharray="5 5"/>
    <polygon points="472,269 460,263 460,275" fill="#8B93C0"/>
    <text x="371" y="258" text-anchor="middle" font-size="12" fill="#A5B4FC">soft labels &#183; softmax(s/&#964;), &#964;=2.0</text>

    <!-- student -->
    <rect x="478" y="236" width="210" height="66" rx="12" fill="url(#stud)"/>
    <text x="583" y="268" text-anchor="middle" font-size="17" font-weight="700" fill="#04201F">Student</text>
    <text x="583" y="288" text-anchor="middle" font-size="12" fill="#063B3A">e5-base &#183; 109M &#183; 768-d</text>

    <!-- loss recipe pill, fills the right side -->
    <rect x="726" y="236" width="410" height="66" rx="12" fill="#13213F" stroke="#33406B"/>
    <text x="931" y="268" text-anchor="middle" font-size="19" font-weight="600" fill="#D6E0FF" font-style="italic">
      <tspan>L</tspan><tspan dx="6" font-style="normal">=</tspan><tspan dx="6">L</tspan><tspan font-size="11" font-style="normal" dy="5" fill="#A5B4FC">KL</tspan><tspan dy="-5" dx="6" font-style="normal">+</tspan><tspan dx="6" font-style="normal">&#945;</tspan><tspan dx="4" font-style="normal">&#183;</tspan><tspan dx="4">L</tspan><tspan font-size="11" font-style="normal" dy="5" fill="#9FE6DC">InfoNCE</tspan>
    </text>
    <text x="931" y="289" text-anchor="middle" font-size="11.5" font-style="normal" fill="#7E8AB5">&#945; = 0.2  &#183;  KL &#964; = 2.0  &#183;  InfoNCE &#964; = 0.01</text>
  </g>

  <rect x="0.5" y="0.5" width="1199" height="339" rx="18" fill="none" stroke="#2A335A" stroke-width="1"/>
</svg>
